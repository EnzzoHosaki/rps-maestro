# RabbitMQ runtime config — montado em /etc/rabbitmq/conf.d/ via docker-compose.
#
# consumer_timeout: tempo máximo que o broker espera por um basic_ack antes de
# fechar o canal do consumidor com PRECONDITION_FAILED. Default do broker é
# 30 min, o que é menor que jobs grandes do bot-xml-gms (NFCE 5+ dias = ~45min
# entre automação Selenium + cópia de XMLs). Quando o canal morre, o
# basic_ack do worker estoura ChannelWrongStateError, a mensagem é reentregue
# e o worker reprocessa do zero — vide incidente 2026-05-13 com job
# ce2724d8 (8.667 XMLs copiados 4x em loop).
#
# 4h cobre com folga os jobs conhecidos hoje. Se algum job legítimo passar
# disso, aumentar aqui (ou setar `consumer_timeout = false` pra desabilitar,
# mas isso esconde workers travados de verdade).
#
# Unidade: milissegundos.
consumer_timeout = 14400000
