# CI mínimo: valida backend Go e frontend Next em todo PR e push na main.
# Espelha exatamente o que se roda localmente antes de commitar — nada de
# testes inventados, só o que o projeto já usa como critério de saúde.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Go build + vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  web:
    name: Next tsc + eslint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src
      - run: npm run build
